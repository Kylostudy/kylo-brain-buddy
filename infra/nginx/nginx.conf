# =============================================================================
# Nginx — Reverse proxy konfiguráció
# Ez a fájl a bejövő HTTP/HTTPS kéréseket továbbítja a megfelelő szolgáltatásnak
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log formátum
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Teljesítmény optimalizálás
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip tömörítés (kisebb adatforgalom)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # =============================================================================
    # KyloBrain — workflow kezelő, LEGO könyvtár
    # =============================================================================
    server {
        listen 80;
        server_name brain.kylosystems.com localhost;

        location / {
            proxy_pass http://kylo-brain:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }

    # =============================================================================
    # KyloKit — Playwright session kezelő
    # =============================================================================
    server {
        listen 80;
        server_name kit.kylosystems.com localhost;

        location / {
            proxy_pass http://kylo-kit:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }

    # Alapértelmezett: ha nem egyezik a domain, dobjuk vissza
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
