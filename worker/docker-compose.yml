services:
  executor-image:
    build:
      context: .
      dockerfile: Dockerfile
    image: kylo-executor:latest
    command: ["true"]   # csak image-et építünk vele, ne fusson tartósan
    restart: "no"

  orchestrator:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./orchestrator:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - BRAIN_URL=${BRAIN_URL}
      - WORKER_API_TOKEN=${WORKER_API_TOKEN}
      - WORKER_ID=${WORKER_ID:-worker-1}
      - EXECUTOR_IMAGE=kylo-executor:latest
      - MAX_PARALLEL=${MAX_PARALLEL:-4}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-3000}
    command: sh -c "apk add --no-cache docker-cli && node index.js"
    depends_on:
      - executor-image
    restart: unless-stopped

  recorder:
    build:
      context: .
      dockerfile: recorder/Dockerfile
    image: kylo-recorder:latest
    shm_size: "1gb"
    environment:
      - BRAIN_URL=${BRAIN_URL}
      - WORKER_API_TOKEN=${WORKER_API_TOKEN}
      - WORKER_ID=${WORKER_ID:-recorder-1}
      - RECORD_POLL_INTERVAL_MS=${RECORD_POLL_INTERVAL_MS:-2000}
      - RECORD_MAX_SESSIONS=${RECORD_MAX_SESSIONS:-2}
      - RECORD_FPS=${RECORD_FPS:-5}
      - RECORD_VIEWPORT_W=${RECORD_VIEWPORT_W:-1280}
      - RECORD_VIEWPORT_H=${RECORD_VIEWPORT_H:-800}
      - PROXY_1=${PROXY_1:-}
      - PROXY_2=${PROXY_2:-}
    restart: unless-stopped

